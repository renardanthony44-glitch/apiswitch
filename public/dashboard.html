<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ApiSwitch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f; color: #e8e8f0; min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(10,10,15,0.95); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
    .logo span { color: #7c6ff7; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-back { font-size: 13px; color: rgba(232,232,240,0.45); transition: color .15s; }
    .nav-back:hover { color: #e8e8f0; }

    .page { max-width: 900px; margin: 0 auto; padding: 40px 24px 100px; }

    /* Auth card */
    .auth-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px; padding: 24px; margin-bottom: 32px;
    }
    .auth-card h2 { font-size: 14px; font-weight: 700; color: rgba(232,232,240,0.5); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; }
    .auth-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .auth-row input {
      flex: 1; min-width: 200px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px; padding: 10px 14px; font-size: 14px; color: #e8e8f0;
      font-family: 'SF Mono', Consolas, monospace; outline: none;
      transition: border-color .15s;
    }
    .auth-row input:focus { border-color: #7c6ff7; }
    .auth-row input::placeholder { color: rgba(232,232,240,0.3); }
    .btn-sm {
      background: #7c6ff7; color: #fff; border: none; border-radius: 8px;
      padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
      transition: background .15s; white-space: nowrap;
    }
    .btn-sm:hover { background: #6a5de8; }
    .btn-sm.secondary {
      background: rgba(255,255,255,0.07); color: rgba(232,232,240,0.7);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .btn-sm.secondary:hover { background: rgba(255,255,255,0.12); }
    .btn-sm.danger { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
    .btn-sm.danger:hover { background: rgba(239,68,68,0.28); }

    /* Section header */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-count { font-size: 12px; color: rgba(232,232,240,0.4); background: rgba(255,255,255,0.06); padding: 3px 10px; border-radius: 999px; }

    /* Keys table */
    .keys-table {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; overflow: hidden; margin-bottom: 32px;
    }
    .keys-table-header {
      display: grid; grid-template-columns: 100px 1fr 90px 90px 80px 80px;
      gap: 12px; padding: 11px 20px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 11px; font-weight: 700; color: rgba(232,232,240,0.4);
      text-transform: uppercase; letter-spacing: .6px;
    }
    .key-row {
      display: grid; grid-template-columns: 100px 1fr 90px 90px 80px 80px;
      gap: 12px; padding: 14px 20px; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background .1s;
    }
    .key-row:last-child { border-bottom: none; }
    .key-row:hover { background: rgba(255,255,255,0.03); }
    .provider-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(124,111,247,0.14); color: #a89ff9;
      border: 1px solid rgba(124,111,247,0.22);
      padding: 3px 9px; border-radius: 6px; font-size: 12px; font-weight: 600;
    }
    .key-label-cell { font-size: 13px; color: rgba(232,232,240,0.8); }
    .key-label-cell small { display: block; font-size: 11px; color: rgba(232,232,240,0.35); font-family: 'SF Mono', Consolas, monospace; margin-top: 2px; }
    .usage-cell { font-size: 13px; color: rgba(232,232,240,0.6); }
    .date-cell { font-size: 11px; color: rgba(232,232,240,0.4); }
    .badge-ok { display: inline-block; background: rgba(110,231,183,0.12); color: #6ee7b7; border: 1px solid rgba(110,231,183,0.22); padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; }
    .badge-exhausted { display: inline-block; background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; }
    .empty-state {
      padding: 40px; text-align: center;
      color: rgba(232,232,240,0.35); font-size: 14px;
    }

    /* Add key form */
    .add-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 24px;
    }
    .add-card h3 { font-size: 14px; font-weight: 700; color: rgba(232,232,240,0.6); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 140px 1fr 160px; gap: 10px; margin-bottom: 12px; }
    .form-grid select, .form-grid input {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px; padding: 10px 14px; font-size: 14px; color: #e8e8f0;
      outline: none; transition: border-color .15s; width: 100%;
    }
    .form-grid select { cursor: pointer; }
    .form-grid select option { background: #1a1a24; }
    .form-grid select:focus, .form-grid input:focus { border-color: #7c6ff7; }
    .form-grid input::placeholder { color: rgba(232,232,240,0.3); }

    /* Notifications */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: rgba(30,30,40,0.97); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 12px 18px;
      font-size: 13px; color: #e8e8f0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(80px); opacity: 0;
      transition: transform .25s, opacity .25s;
      z-index: 999; max-width: 340px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(110,231,183,0.3); color: #6ee7b7; }
    .toast.error { border-color: rgba(239,68,68,0.3); color: #fca5a5; }

    /* Loading spinner */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #7c6ff7; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .keys-table-header, .key-row { grid-template-columns: 90px 1fr 60px 60px; }
      .keys-table-header > *:nth-child(5), .keys-table-header > *:nth-child(6),
      .key-row > *:nth-child(5), .key-row > *:nth-child(6) { display: none; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid input[placeholder="Label (optionnel)"] { grid-column: 1/-1; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">Api<span>Switch</span> <span style="font-size:11px;font-weight:500;color:rgba(232,232,240,0.35);margin-left:6px">Dashboard</span></div>
  <div class="nav-right">
    <a class="nav-back" href="/">← Accueil</a>
  </div>
</nav>

<div class="page">

  <!-- Auth -->
  <div class="auth-card">
    <h2>Connexion</h2>
    <div class="auth-row">
      <input type="password" id="apiswitch-key" placeholder="Votre clé ApiSwitch (x-apiswitch-key)" />
      <input type="password" id="proxy-secret" placeholder="Secret proxy (x-rapidapi-proxy-secret)" />
      <button class="btn-sm" onclick="saveCredentials()">Connecter</button>
      <button class="btn-sm secondary" onclick="clearCredentials()">Déconnecter</button>
    </div>
  </div>

  <!-- Keys table -->
  <div class="section-header">
    <span class="section-title">Clés provider</span>
    <span class="section-count" id="key-count">—</span>
  </div>

  <div class="keys-table">
    <div class="keys-table-header">
      <span>Provider</span>
      <span>Label / ID</span>
      <span>Quota</span>
      <span>Utilisations</span>
      <span>Dernière util.</span>
      <span>Statut</span>
    </div>
    <div id="keys-body">
      <div class="empty-state">Entrez votre clé ApiSwitch pour charger vos clés.</div>
    </div>
  </div>

  <!-- Add key form -->
  <div class="add-card">
    <h3>Ajouter une clé provider</h3>
    <div class="form-grid">
      <select id="new-provider">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="mistral">Mistral</option>
        <option value="groq">Groq</option>
        <option value="cohere">Cohere</option>
        <option value="together">Together AI</option>
      </select>
      <input type="text" id="new-key" placeholder="sk-... (clé API provider)" />
      <input type="text" id="new-label" placeholder="Label (optionnel)" />
    </div>
    <button class="btn-sm" onclick="addKey()">Ajouter la clé</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const BASE = '';

  function getHeaders() {
    const k = localStorage.getItem('apiswitch_key') || '';
    const s = localStorage.getItem('proxy_secret') || '';
    return {
      'Content-Type': 'application/json',
      'x-apiswitch-key': k,
      'x-rapidapi-proxy-secret': s,
    };
  }

  function saveCredentials() {
    const k = document.getElementById('apiswitch-key').value.trim();
    const s = document.getElementById('proxy-secret').value.trim();
    if (!k || !s) return showToast('Renseignez les deux champs.', 'error');
    localStorage.setItem('apiswitch_key', k);
    localStorage.setItem('proxy_secret', s);
    document.getElementById('apiswitch-key').value = '';
    document.getElementById('proxy-secret').value = '';
    showToast('Connecté.', 'success');
    loadKeys();
  }

  function clearCredentials() {
    localStorage.removeItem('apiswitch_key');
    localStorage.removeItem('proxy_secret');
    document.getElementById('keys-body').innerHTML = '<div class="empty-state">Entrez votre clé ApiSwitch pour charger vos clés.</div>';
    document.getElementById('key-count').textContent = '—';
    showToast('Déconnecté.', 'success');
  }

  async function loadKeys() {
    const k = localStorage.getItem('apiswitch_key');
    if (!k) return;
    const body = document.getElementById('keys-body');
    body.innerHTML = '<div class="empty-state"><span class="spinner"></span>Chargement…</div>';
    try {
      const r = await fetch(BASE + '/api/keys', { headers: getHeaders() });
      if (r.status === 401 || r.status === 403) {
        body.innerHTML = '<div class="empty-state">Clé invalide ou secret incorrect.</div>';
        document.getElementById('key-count').textContent = '0';
        return;
      }
      const data = await r.json();
      const keys = data.keys || [];
      document.getElementById('key-count').textContent = keys.length + ' clé' + (keys.length !== 1 ? 's' : '');
      if (!keys.length) {
        body.innerHTML = '<div class="empty-state">Aucune clé provider. Ajoutez-en une ci-dessous.</div>';
        return;
      }
      body.innerHTML = keys.map(k => `
        <div class="key-row" id="row-${k.id}">
          <div><span class="provider-badge">${k.provider}</span></div>
          <div class="key-label-cell">
            ${escHtml(k.label || k.provider)}
            <small>ID: ${escHtml(k.id)}</small>
          </div>
          <div class="usage-cell">${k.remainingQuota !== null && k.remainingQuota !== undefined ? k.remainingQuota : '—'}</div>
          <div class="usage-cell">${k.usageCount ?? 0}</div>
          <div class="date-cell">${k.lastUsed ? new Date(k.lastUsed).toLocaleDateString('fr-FR') : '—'}</div>
          <div style="display:flex;align-items:center;gap:8px">
            ${k.exhausted ? '<span class="badge-exhausted">Épuisée</span>' : '<span class="badge-ok">OK</span>'}
            <button class="btn-sm danger" style="padding:5px 10px;font-size:11px" onclick="deleteKey('${k.id}')">✕</button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      body.innerHTML = '<div class="empty-state">Erreur de connexion au serveur.</div>';
    }
  }

  async function addKey() {
    const provider = document.getElementById('new-provider').value;
    const key     = document.getElementById('new-key').value.trim();
    const label   = document.getElementById('new-label').value.trim();
    if (!key) return showToast('La clé provider est requise.', 'error');
    try {
      const r = await fetch(BASE + '/api/keys', {
        method: 'POST', headers: getHeaders(),
        body: JSON.stringify({ provider, key, label }),
      });
      const data = await r.json();
      if (!r.ok) return showToast(data.error || 'Erreur lors de l\'ajout.', 'error');
      document.getElementById('new-key').value = '';
      document.getElementById('new-label').value = '';
      showToast('Clé ajoutée.', 'success');
      loadKeys();
    } catch (e) {
      showToast('Erreur réseau.', 'error');
    }
  }

  async function deleteKey(id) {
    if (!confirm('Supprimer cette clé ?')) return;
    try {
      const r = await fetch(BASE + '/api/keys/' + id, { method: 'DELETE', headers: getHeaders() });
      if (!r.ok) return showToast('Erreur lors de la suppression.', 'error');
      document.getElementById('row-' + id)?.remove();
      showToast('Clé supprimée.', 'success');
      loadKeys();
    } catch (e) {
      showToast('Erreur réseau.', 'error');
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3200);
  }

  // Restore credentials hint on load
  window.addEventListener('DOMContentLoaded', () => {
    const k = localStorage.getItem('apiswitch_key');
    if (k) {
      document.getElementById('apiswitch-key').placeholder = '••••••• (clé sauvegardée)';
      document.getElementById('proxy-secret').placeholder = '••••••• (secret sauvegardé)';
      loadKeys();
    }
  });
</script>
</body>
</html>
